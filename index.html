<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creative Studio Avatar</title>
    <style>
      :root {
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-400: #9ca3af;
        --gray-500: #6b7280;
        --gray-600: #4b5563;
        --gray-900: #111827;
        --blue-50: #eff6ff;
        --blue-200: #bfdbfe;
        --blue-500: #3b82f6;
        --blue-600: #2563eb;
        --blue-700: #1d4ed8;
        --red-500: #ef4444;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: white;
        color: var(--gray-900);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Navigation Bar */
      header {
        height: 56px;
        border-bottom: 1px solid var(--gray-100);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        position: sticky;
        top: 0;
        background-color: white;
        z-index: 10;
      }

      .header-left, .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .header-left {
        overflow: hidden;
      }

      .nav-breadcrumb {
        display: none;
        align-items: center;
        font-size: 14px;
        color: var(--gray-500);
        white-space: nowrap;
        overflow: hidden;
      }

      @media (min-width: 768px) {
        .nav-breadcrumb {
          display: flex;
        }
      }

      .breadcrumb-item:hover {
        color: var(--gray-900);
        cursor: pointer;
      }

      .breadcrumb-separator {
        margin: 0 8px;
      }

      .breadcrumb-active {
        display: flex;
        align-items: center;
        gap: 4px;
        color: var(--gray-900);
        font-weight: 500;
        cursor: pointer;
      }

      /* Buttons */
      button {
        background: none;
        border: none;
        cursor: pointer;
        transition: background-color 0.2s, color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-icon {
        padding: 8px;
        border-radius: 6px;
        color: var(--gray-600);
      }

      .btn-icon:hover {
        background-color: var(--gray-50);
      }

      .btn-text-blue {
        color: var(--blue-500);
        font-size: 14px;
        font-weight: 500;
        gap: 8px;
      }

      .btn-text-blue:hover {
        color: var(--blue-600);
      }

      .btn-outline-blue {
        padding: 8px;
        color: var(--blue-500);
        background-color: transparent;
        border: 1px solid var(--blue-200);
        border-radius: 6px;
      }

      .btn-outline-blue:hover {
        background-color: var(--blue-50);
      }

      .btn-primary {
        background-color: var(--blue-600);
        color: white;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
      }

      .btn-primary:hover {
        background-color: var(--blue-700);
      }

      /* Logo & Profile */
      .logo-container {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .logo-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .profile-img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        overflow: hidden;
        border: 1px solid var(--gray-200);
        cursor: pointer;
      }

      .profile-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .notification-bell {
        position: relative;
        cursor: pointer;
        color: var(--gray-400);
      }

      .notification-dot {
        position: absolute;
        top: -4px;
        right: -4px;
        width: 8px;
        height: 8px;
        background-color: var(--red-500);
        border-radius: 50%;
        border: 2px solid white;
      }

      .divider {
        height: 24px;
        width: 1px;
        background-color: var(--gray-200);
        margin: 0 8px;
      }

      /* Main Content */
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      @media (min-width: 768px) {
        main {
          padding: 32px;
        }
      }

      .video-container {
        width: 100%;
        max-width: 1024px;
        aspect-ratio: 16 / 9;
        background-color: var(--gray-50);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        border: 1px solid var(--gray-100);
        position: relative;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #bbb;
      }

      /* Utility classes for visibility */
      .hidden { display: none; }
      @media (min-width: 1024px) { .lg-flex { display: flex; } }
      @media (min-width: 640px) { .sm-block { display: block; } }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <header>
      <div class="header-left">
        <button class="btn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        
        <div style="display: flex; align-items: center; gap: 8px;">
          <div class="logo-container">
            <img src="/logo.png" alt="Logo" class="logo-img" referrerpolicy="no-referrer" />
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--gray-400);"><path d="m6 9 6 6 6-6"/></svg>
        </div>

        <nav class="nav-breadcrumb">
          <span class="breadcrumb-item">Home</span>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-item">Projects</span>
          <span class="breadcrumb-separator">/</span>
          <span class="breadcrumb-item">Innovation Practice</span>
          <span class="breadcrumb-separator">/</span>
          <div class="breadcrumb-active">
            <span>Discover - Creative Studio</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </nav>
      </div>

      <div class="header-right">
        <div class="hidden lg-flex" style="align-items: center; gap: 24px; margin-right: 16px;">
  
    
        </div>

        <div style="display: flex; align-items: center; gap: 8px;">
        </div>

        <div class="divider hidden sm-block"></div>

        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="hidden sm-block" style="color: var(--gray-400);">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          </button>
          <button style="display: flex; align-items: center; gap: 4px; font-size: 14px; color: var(--gray-500);">
            <span>Help</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="notification-bell">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            <div class="notification-dot"></div>
          </div>
          <div class="profile-img">
            <img src="https://picsum.photos/seed/avatar/100/100" alt="User Profile" referrerpolicy="no-referrer" />
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main>
      <div class="video-container">
        <iframe 
          src="https://embed.liveavatar.com/v1/7da895ce-1286-43e8-a7a5-58d39b824ff4" 
          allow="microphone" 
          title="LiveAvatar Embed" 
        ></iframe>
      </div>
    </main>
  </body>
</html>
